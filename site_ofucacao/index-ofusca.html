<title>Curso de CyberSecurity: UC01483</title>

<style>

body{
    margin:0;
    background:#ccffcc;
    font-family:Arial, Helvetica, sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;

.container{

/* Caixa do título */
.caixa{

}

/* Botão */
.botao{
    background:white;
    color:#004d00;

    width:220px;
    height:60px;

    border:none;
    border-radius:15px;

    font-size:22px;
    font-weight:bold;

    cursor:pointer;

    box-shadow:0px 5px 12px rgba(0,0,0,0.2);

    transition:.3s;
}

.botao:hover{
    background:#f4f4f4;
    transform:scale(1.05);
}

.mensagem{
    margin-top:25px;
    font-size:24px;
    font-weight:bold;
    color:#004d00;
}

</style>

</head>

</div>
